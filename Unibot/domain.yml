version: "2.0"
session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
intents:
- inform_num_semester:
    use_entities: []
- inform_course_name:
    use_entities: []
- request_course_description
- request_course_general_info
- greeting
- affirm
- thankyou
- goodbye
entities:
- num_semester
- course_name
slots:
  num_semester:
    type: any
  course_name:
    type: text
responses:
  utter_greeting:
  - text: "Γειά σου! Μιλάς με το Unibot, τον ακαδημαϊκό βοηθό. Μπορώ να σου λύσω απορίες για όποιο μάθημα σε ενδιαφέρει. Πως μπορώ να σε βοηθήσω?"
  utter_ask_num_semester:
  - text: "Οκ. Ποιό είναι το εξάμηνό σου;"
  utter_ask_course_name:
  - text: "Ποιό είναι το όνομα του μαθήματος που σε ενδιαφέρει;"
  utter_you_are_welcome:
  - text: "Κανένα πρόβλημα!"
  utter_goodbye:
  - text: "Καλή συνέχεια!"
actions:
  - action_supply_course_description
  - validate_course_form
forms:
  course_form:
    required_slots:
        num_semester:
          - type: from_entity
            entity: num_semester
        course_name:
          - type: from_entity
            entity: course_name