version: "2.0"
rules:

- rule: Greet user
  steps:
  - intent: greeting
  - action: utter_greeting

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say thank you anytime the user says thank you
  steps:
  - intent: thankyou
  - action: utter_you_are_welcome

- rule: Activate Course form
  steps:
  - intent: request_course_description
  - action: course_form
  - active_loop: course_form

- rule: Terminate Course Form
  condition:
  - active_loop: course_form
  steps:
  - action: course_form
  - active_loop: null
  - slot_was_set:
    - requested_slot: null
  - action: action_supply_course_description